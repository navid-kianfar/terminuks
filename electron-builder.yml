appId: com.terminuks.app
productName: Terminuks
directories:
  buildResources: assets
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
  - electron/local-shell-bridge.py
  - package.json
  - README.md
  - LICENSE
  - node_modules/**/*
win:
  target:
    - nsis
    - portable
  icon: assets/icon.ico
  artifactName: Terminuks-${version}-windows-${arch}.${ext}
mac:
  target:
    - dmg
    - zip
  icon: assets/icon.png
  category: public.app-category.developer-tools
  artifactName: Terminuks-${version}-mac-${arch}.${ext}
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: entitlements.mac.plist
  entitlementsInherit: entitlements.mac.inherit.plist
  notarize:
    teamId: "${APPLE_TEAM_ID}"
linux:
  target:
    - AppImage
    - deb
    - tar.gz
  icon: assets/icon.png
  category: Network
  artifactName: Terminuks-${version}-linux-${arch}.${ext}
