name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            release_script: release:mac
            artifact_name: terminuks-macos
          - name: Linux
            os: ubuntu-latest
            release_script: release:linux
            artifact_name: terminuks-linux
          - name: Windows
            os: windows-latest
            release_script: release:win
            artifact_name: terminuks-windows

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Mac signing/notarization secrets are temporarily disabled because signing breaks CI.
      # APPLE_ID: ${{ secrets.APPLE_ID }}
      # APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
      # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      # CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
      # CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native dependencies
        run: npm rebuild node-pty

      - name: Build release artifacts
        run: npm run ${{ matrix.release_script }}

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.zip
            release/*.AppImage
            release/*.deb
            release/*.tar.gz
            release/*.yml
            release/*.blockmap
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.dmg
            release-assets/*.exe
            release-assets/*.zip
            release-assets/*.AppImage
            release-assets/*.deb
            release-assets/*.tar.gz
            release-assets/*.yml
            release-assets/*.blockmap
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
